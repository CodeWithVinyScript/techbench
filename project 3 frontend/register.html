<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - VibeSync</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url("css/assets/registerbg.png");background-repeat: no-repeat; background-size: cover; background-blend-mode: color-burn;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .register-container {
      background: #1e293b;
      padding: 40px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    .register-container h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(45deg, #6366f1, #ec4899);
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .register-container p {
      margin-top: 15px;
      font-size: 14px;
    }

    .register-container a {
      color: #6366f1;
      text-decoration: none;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 5px;
    }

    .success {
      color: lightgreen;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="register-container">
  <h2>Create Account</h2>

  <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

    <button type="submit">Register</button>

    <p>Already have an account? <a href="login.html">Login</a></p>

    <p class="error" id="errorMsg"></p>
    <p class="success" id="successMsg"></p>
  </form>
</div>

<script>
  document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    errorMsg.innerText = "";
    successMsg.innerText = "";

    // Validation
    if (!name || !email || !password || !confirmPassword) {
      errorMsg.innerText = "All fields are required!";
      return;
    }

    if (password.length < 6) {
      errorMsg.innerText = "Password must be at least 6 characters!";
      return;
    }

    if (password !== confirmPassword) {
      errorMsg.innerText = "Passwords do not match!";
      return;
    }

    try {
      const response = await fetch("http://localhost:5000/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, password })
      });

      const data = await response.json();

      if (data.success) {
        successMsg.innerText = "Registration successful! Redirecting to login...";
        
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } else {
        errorMsg.innerText = data.message;
      }

    } catch (error) {
      errorMsg.innerText = "Server error!";
    }
  });
</script>

</body>
</html>
